name: CI

# Run on PRs targeting master and direct pushes to master. We intentionally
# do NOT trigger on every topic-branch push — that would burn minutes on
# commits that aren't yet up for review.
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel an in-flight run for the same ref when a new commit lands (e.g. a
# reviewer pushes a fix-up). Saves minutes on rapid PR iteration.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single job that builds the Dockerfile, then runs every test surface
  # against the resulting image. Sequential (not fanned out) because the
  # image isn't in a registry — parallel jobs would each pay the image build.
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Buildx is required for the gha cache backend used below.
      - uses: docker/setup-buildx-action@v3

      # First cold run takes ~5m; cached runs settle to ~30s when go.mod /
      # package-lock.json haven't changed. mode=max exports every layer for
      # maximum cache hit rate — fits inside GHA's 10GB repo budget today.
      - name: Build toolchain image
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: blanket-dev:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Reuse the Makefile targets verbatim — Dockerfile is the single
      # source of truth, same locally and in CI.
      - name: Go tests
        run: make docker-test

      - name: Smoke test
        run: make docker-test-smoke

      - name: Browser tests
        run: make docker-test-browser

      # Playwright's `html` reporter writes to tests/e2e/playwright-report/
      # by default (see tests/e2e/playwright.config.ts). Surface it as a
      # downloadable artifact so PR authors can debug without log-scrubbing.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  # Cross-compile only runs on master pushes. It catches darwin/windows-only
  # breakage at the tip of master without spending minutes on every PR (and
  # the test job above already exercises the linux build end-to-end).
  cross-compile:
    name: cross-compile
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build toolchain image
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: blanket-dev:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Cross-compile linux/darwin/windows
        run: make docker-build
